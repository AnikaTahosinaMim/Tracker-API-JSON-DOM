    <nav>
        <div class="flex justify-between shadow-xl px-[50px] py-5">
            <div class="flex items-center space-x-2">
                <img class=" w-9 h-9" src="./assets/github-logo.png" alt="">
                <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
            </div>
            <div class="flex space-x-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchValue" type="search" required placeholder="Search" />
                </label>
                <div>
                    <button id="search-btn" class="btn btn-primary"> <i class="fa-solid fa-plus"></i> Primary</button>
                </div>

            </div>
        </div>
    </nav>

        <!-- 3 btn section -->
        <section>
            <div class="bg-white shadow-xl rounded-sm space-x-3 p-8 w-11/12 mx-auto">
                <button id="all-btn" onclick="toggleBtn('all-btn')" class="px-10 py-2 btn btn-primary">All</button>
                <button id="open-btn" onclick="toggleBtn('open-btn')" class="px-9 py-2 btn">Open</button>
                <button id="close-btn" onclick="toggleBtn('close-btn')" class="px-9 py-2 btn">Closed</button>
            </div>
        </section>

        <!-- issues or count section 50++ -->
        <section>
            <div
                class="flex justify-between items-center bg-white shadow-xl rounded-sm space-x-3 mt-10 p-8 w-11/12 mx-auto">

                    <img class="w-12 h-12 p-2 bg-gray-200 rounded-full" src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 class="font-bold text-2xl">50 Issues</h2>
                        <p class="text-[#64748B] text-xl">Track and manage your project issues</p>
                    </div>
                </div>
                <!-- open close -->
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1">
                        <span class="w-4 h-4 rounded-full bg-green-500"></span>
                        <p class="font-bold">Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-4 h-4 rounded-full bg-purple-500"></span>
                        <p class="font-bold">Closed</p>
                    </div>
                </div>
            </div>
        </section>
